<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Radio WebOp — sign in</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #0a2536 0%, #061320 60%, #03080f 100%); color: #dcefff; }
    .card { width: min(92vw, 360px); background: #0c1f2c; border: 1px solid #14425c;
      border-radius: 12px; padding: 26px 24px; box-shadow: 0 18px 50px rgba(0,0,0,.45); }
    h1 { margin: 0 0 4px; font-size: 19px; letter-spacing: .3px; }
    h1 span { color: #1ec0ff; }
    p.sub { margin: 0 0 18px; font-size: 12.5px; color: #7fa8bd; }
    label { display: block; font-size: 11px; color: #7fa8bd; margin: 0 0 5px; letter-spacing: .04em; text-transform: uppercase; }
    input { width: 100%; padding: 11px 12px; font-size: 15px; border-radius: 8px;
      border: 1px solid #1c5474; background: #07161f; color: #eaf6ff; outline: none; }
    input:focus { border-color: #1ec0ff; box-shadow: 0 0 0 3px rgba(30,192,255,.25); }
    button { margin-top: 16px; width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer; color: #04121f;
      background: linear-gradient(180deg, #1ec0ff, #1488c0); }
    button:disabled { opacity: .6; cursor: default; }
    .err { margin-top: 12px; min-height: 16px; font-size: 12.5px; color: #ff8a8a; }
  </style>
</head>
<body>
  <form class="card" id="f" autocomplete="on">
    <h1>Radio <span>WebOp</span></h1>
    <p class="sub">Remote access — enter the password set on the host PC.</p>
    <label for="pw">Password</label>
    <input id="pw" name="password" type="password" autocomplete="current-password" autofocus required>
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    var f = document.getElementById("f"), btn = document.getElementById("btn"), err = document.getElementById("err");
    f.addEventListener("submit", async function (e) {
      e.preventDefault();
      err.textContent = ""; btn.disabled = true;
      try {
        var r = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("pw").value })
        });
        var j = await r.json().catch(function () { return {}; });
        if (j.ok) { location.replace("/"); return; }
        err.textContent = j.error || "Sign in failed.";
      } catch (_) { err.textContent = "Network error."; }
      btn.disabled = false;
    });
  </script>
</body>
</html>
